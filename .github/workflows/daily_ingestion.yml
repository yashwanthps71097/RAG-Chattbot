name: Daily Mutual Fund Ingestion

on:
  schedule:
    # 10:00 AM IST is 4:30 AM UTC
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Ingestion Pipeline
        env:
          # Used if your indexing needs specific model tokens
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
        run: |
          python -m ingestion.run

      - name: Commit and Push Updated Indexes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          # Commit only if changes exist, skip CI triggering to prevent loops
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update mutual fund index data [skip ci]" && git push)
